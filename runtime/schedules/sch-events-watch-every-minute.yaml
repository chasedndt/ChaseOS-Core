# runtime/schedules/sch-events-watch-every-minute.yaml
# ChaseOS Scheduling Intent - canonical schedule declaration
#
# This file is ChaseOS-owned canonical state.
# Hermes reads this intent and invokes:
#   chaseos events watch --once --execute
# once per minute so pending vault-local runtime events can trigger their
# registered follow-on workflows.
# OpenClaw is the declared fallback executor (runtime_adapter_fallback).
#
# To change enabled state: chaseos schedule enable/disable sch-events-watch-every-minute
# Do not edit this file manually to toggle enabled - use the CLI.

schedule_id: sch-events-watch-every-minute
schedule_kind: command
command_id: events.watch
command: "chaseos events watch --once --execute"

owner: "operator"

cadence:
  type: cron
  cron_expression: "* * * * *"
  timezone: America/New_York
  event_type: null
  event_source: null

trigger_source: hermes

runtime_adapter_target: hermes
runtime_adapter_fallback: openclaw
# Hermes is the primary schedule executor. OpenClaw is the declared fallback.

delivery:
  primary_target: vault-local
  vault_writeback_targets:
    - "runtime/events/"
    - "07_LOGS/SBP-Runs/"
    - "07_LOGS/Agent-Activity/"
  external_delivery_declared: false
  vault_local_only: true

approval_policy: none

enabled: true
shadow_mode: false

failure_behavior: escalate

audit_requirements:
  - schedule_id
  - command_id
  - trigger_time
  - event_dispatch_status
  - dispatch_count
  - files_written
  - run_duration_seconds

allowed_workflow_task_types: []
# Command schedules do not bind to a workflow task type. The loader still keeps
# this field for schema parity with workflow schedules and accepts an empty list.

allowed_command_ids:
  - events.watch

provenance:
  created_by: operator
  created_at: "2026-04-27T00:00:00Z"
  rationale: >
    Event-triggered workflows need an autonomous bounded dispatcher loop.
    This command schedule runs one event-watch cycle per OpenClaw cron tick,
    executing eligible dispatch rules such as acquisition.new_item ->
    sbp_strikezone_digest without requiring manual operator invocation.

notes: >
  This schedule intentionally runs chaseos events watch --once rather than a
  long-lived interval loop. Each cron tick performs one bounded dispatch pass
  and exits. The scheduler loader only permits command schedules whose command_id
  is allowlisted in runtime/schedules/loader.py.
