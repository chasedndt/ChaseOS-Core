# runtime/schedules/sch-operator-today-0700.yaml
# ChaseOS Scheduling Intent — canonical schedule declaration
#
# This file is ChaseOS-owned canonical state.
# Do not create or edit schedule intents directly in the runtime adapter
# (OpenClaw, n8n, etc.). The adapter reads this file and executes accordingly.
#
# Current execution: Hermes reads this intent and invokes:
#   chaseos run operator_today
# through the AOR path at 07:00 ET on US weekdays.
# OpenClaw is the declared fallback executor (runtime_adapter_fallback).
#
# To change enabled state: chaseos schedule enable/disable sch-operator-today-0700
# Do not edit this file manually to toggle enabled — use the CLI.

schedule_id: sch-operator-today-0700
workflow_id: operator_today

owner: "operator"

cadence:
  type: cron
  cron_expression: "0 7 * * 1-5"
  timezone: America/New_York
  event_type: null
  event_source: null

trigger_source: hermes

runtime_adapter_target: hermes
runtime_adapter_fallback: openclaw
# Hermes is the primary schedule executor. OpenClaw is the declared fallback.
# To switch executors: change runtime_adapter_target and trigger_source.
# Must be a registered adapter: hermes | openclaw | claude | n8n | local | manual

delivery:
  primary_target: vault-local
  vault_writeback_targets:
    - "07_LOGS/Operator-Briefs/"
  external_delivery_declared: false
  vault_local_only: true
  # vault_local_only: true — no Discord, email, or external delivery.
  # The brief goes to 07_LOGS/Operator-Briefs/ only.
  # Set to false and add external targets when shadow mode is validated.

approval_policy: none
# none = runs without operator confirmation at trigger time.
# Operator ran this manually during development; scheduled run is trusted.
# Change to pre-delivery if you want to review before external delivery.

enabled: true
shadow_mode: false
# shadow_mode: false — brief is written and delivery (vault-local) proceeds.
# Set shadow_mode: true to run silently (no delivery) during testing.

failure_behavior: escalate

audit_requirements:
  - workflow_id
  - schedule_id
  - trigger_time
  - status
  - files_written
  - run_duration_seconds

allowed_workflow_task_types:
  - operator-briefing
# Only workflows with task_type=operator-briefing may execute on this schedule.
# schedule engine enforces this at validation time.

provenance:
  created_by: operator
  created_at: "2026-04-15T00:00:00Z"
  rationale: >
    Daily morning briefing at 0700 ET on US weekdays. This schedule canonicalizes
    the operator_today job that was previously configured directly in OpenClaw
    cron. ChaseOS now owns the schedule intent. OpenClaw executes it via
    chaseos run operator_today through the AOR path.

notes: >
  Phase 9 Schedule Layer — this is the first native ChaseOS schedule intent.
  Execution still happens through OpenClaw (reads this file, invokes chaseos run).
  When native ChaseOS scheduling is built (Phase 9+), this file will be the
  canonical source for the native scheduler as well.
  Brief output: 07_LOGS/Operator-Briefs/YYYY-MM-DD-operator-today.md
