# runtime/schedules/sch-operator-close-day-1900.yaml
# ChaseOS Scheduling Intent — canonical schedule declaration
#
# This file is ChaseOS-owned canonical state.
# Do not create or edit schedule intents directly in the runtime adapter
# (OpenClaw, n8n, etc.). The adapter reads this file and executes accordingly.
#
# Current execution: Hermes reads this intent and invokes:
#   chaseos run operator_close_day
# through the AOR path at 19:00 ET on US weekdays.
# OpenClaw is the declared fallback executor (runtime_adapter_fallback).
#
# To change enabled state: chaseos schedule enable/disable sch-operator-close-day-1900
# Do not edit this file manually to toggle enabled — use the CLI.

schedule_id: sch-operator-close-day-1900
workflow_id: operator_close_day

owner: "operator"

cadence:
  type: cron
  cron_expression: "0 19 * * 1-5"
  timezone: America/New_York
  event_type: null
  event_source: null

trigger_source: hermes

runtime_adapter_target: hermes
runtime_adapter_fallback: openclaw
# Hermes is the primary schedule executor. OpenClaw is the declared fallback.
# To switch executors: change runtime_adapter_target and trigger_source.
# Must be a registered adapter: hermes | openclaw | claude | n8n | local | manual

delivery:
  primary_target: vault-local
  vault_writeback_targets:
    - "07_LOGS/Operator-Briefs/"
  external_delivery_declared: false
  vault_local_only: true
  # vault_local_only: true — close note goes to 07_LOGS/Operator-Briefs/ only.
  # No Discord or external delivery for the close note in Phase 9.

approval_policy: none
# none = runs without operator confirmation at trigger time.
# Operator ran this manually during development; scheduled run is trusted.

enabled: true
shadow_mode: false
# shadow_mode: false — close note is written normally.

failure_behavior: escalate

audit_requirements:
  - workflow_id
  - schedule_id
  - trigger_time
  - status
  - files_written
  - open_loops_count

allowed_workflow_task_types:
  - operator-briefing
# Only workflows with task_type=operator-briefing may execute on this schedule.
# operator_close_day has task_type=operator-briefing. Both pass validation.

provenance:
  created_by: operator
  created_at: "2026-04-15T00:00:00Z"
  rationale: >
    End-of-day close at 1900 ET on US weekdays. This schedule canonicalizes
    the operator_close_day job that was previously configured directly in OpenClaw
    cron. ChaseOS now owns the schedule intent. OpenClaw executes it via
    chaseos run operator_close_day through the AOR path.

notes: >
  Phase 9 Schedule Layer — second native ChaseOS schedule intent.
  Execution still happens through OpenClaw (reads this file, invokes chaseos run).
  Close note captures open loops, build log summary, quarantine status.
  Output: 07_LOGS/Operator-Briefs/YYYY-MM-DD-close-day.md
