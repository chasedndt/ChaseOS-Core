# runtime/schedules/sch-os-hygiene-graph-0300.yaml
# ChaseOS Scheduling Intent - canonical schedule declaration
#
# This file is ChaseOS-owned canonical state.
# Do not create or edit schedule intents directly in the runtime adapter
# (OpenClaw, n8n, etc.). The adapter reads this file and executes accordingly.
#
# Current execution: Hermes cron reads this intent and invokes:
#   chaseos run os_hygiene_graph
# through the AOR path at 03:00 and 15:00 ET daily (all 7 days).
#
# To change enabled state: chaseos schedule enable/disable sch-os-hygiene-graph-0300
# Do not edit this file manually to toggle enabled - use the CLI.

schedule_id: sch-os-hygiene-graph-0300
workflow_id: os_hygiene_graph

owner: "operator"

cadence:
  type: cron
  cron_expression: "0 3,15 * * *"
  timezone: America/New_York
  event_type: null
  event_source: null

trigger_source: hermes

runtime_adapter_target: hermes
runtime_adapter_fallback: openclaw
# Hermes is the primary schedule executor. OpenClaw is the declared fallback.
# To switch executors: change runtime_adapter_target and trigger_source.
# Must be a registered adapter: hermes | openclaw | claude | n8n | local | manual

delivery:
  primary_target: vault-local
  vault_writeback_targets:
    - "07_LOGS/Maintain-Runs/"
    - "07_LOGS/Hygiene-Reports/"
    - "07_LOGS/Daily/"
  external_delivery_declared: false
  vault_local_only: true

approval_policy: none
# none = runs without operator confirmation at trigger time.
# Deterministic OS maintenance needs no approval at trigger time, but the
# workflow itself still blocks mutation while review-gated loose-node debt
# remains unless allow_review_debt is explicitly supplied.

enabled: true
shadow_mode: false

failure_behavior: escalate

audit_requirements:
  - workflow_id
  - schedule_id
  - trigger_time
  - status
  - files_written
  - run_duration_seconds

allowed_workflow_task_types:
  - os-graph-maintenance
# Only workflows with task_type=os-graph-maintenance may execute on this schedule.

provenance:
  created_by: operator
  created_at: "2026-04-26T00:00:00Z"
  rationale: >
    Twice-daily 03:00 ET and 15:00 ET vault graph maintenance sweep to ensure all outputs
    generated by agents and pipelines are wired into the graph
    schema. Runs daily (not Mon-Fri only) because agent activity can occur
    on weekends and both morning and afternoon operator surfaces should read a clean vault.
    The 03:00 ET pass completes before the 05:50 ET acquisition job; the 15:00 ET pass
    catches same-day build/documentation logs before the close-day lane.

notes: >
  Phase 9 Schedule Layer. This schedule intent replaces the raw Python module
  chain previously documented in CRON-SETUP-GUIDE.md Job 5. ChaseOS now owns
  the os_hygiene_graph schedule intent. Hermes executes it via chaseos run
  os_hygiene_graph through the AOR path, with OpenClaw retained as fallback.
  Scheduled Hermes runs inherit strict_review_gate=true and allow_review_debt=false
  from the workflow handler: if Stage 1 finds review-gated loose nodes, the run
  returns blocked_review_required, writes the Maintain-Runs record, and skips
  mutating stages until an operator reviews the loose-node queue or explicitly
  supplies an override. The chaseos maintain CLI remains the human-facing direct path.
  Run record output: 07_LOGS/Maintain-Runs/YYYY-MM-DD-os-hygiene-graph-run.md
