# runtime/schedules/sch-openclaw-watch-every-minute.yaml
# ChaseOS Scheduling Intent - canonical schedule declaration
#
# This file is ChaseOS-owned canonical state.
# Hermes reads this intent and invokes:
#   chaseos run openclaw_watch --adapter openclaw --coordination-via runtime/agent_bus/
# once per minute so OpenClaw can poll the coordination bus autonomously.
# OpenClaw is the declared fallback executor (runtime_adapter_fallback).
#
# To change enabled state: chaseos schedule enable/disable sch-openclaw-watch-every-minute
# Do not edit this file manually to toggle enabled - use the CLI.

schedule_id: sch-openclaw-watch-every-minute
workflow_id: openclaw_watch

owner: "operator"

cadence:
  type: cron
  cron_expression: "* * * * *"
  timezone: America/New_York
  event_type: null
  event_source: null

trigger_source: hermes

runtime_adapter_target: hermes
runtime_adapter_fallback: openclaw
# Hermes is the primary schedule executor. OpenClaw is the declared fallback.

delivery:
  primary_target: vault-local
  vault_writeback_targets:
    - "07_LOGS/Operator-Briefs/"
    - "07_LOGS/Agent-Activity/"
    - "07_LOGS/Build-Logs/"
  external_delivery_declared: false
  vault_local_only: true

approval_policy: none

enabled: false
shadow_mode: false

# H-3 rate guard: 720 cycles/day = one cycle every 2 minutes on average.
# Equal authority to Hermes — same ceiling. Enforcement is in engine.py
# pre-stage rate_check; cron fires every minute, blocked after daily ceiling.
max_cycles_per_day: 720

failure_behavior: escalate

audit_requirements:
  - workflow_id
  - schedule_id
  - trigger_time
  - status
  - cycles_run
  - tasks_dispatched
  - tasks_escalated
  - run_duration_seconds

allowed_workflow_task_types:
  - coordination

provenance:
  created_by: operator
  created_at: "2026-04-27T00:00:00Z"
  rationale: >
    OpenClaw watch already exists as the bus polling and dispatch loop, but without
    schedule intent it must be invoked manually. This schedule runs the single-cycle
    watcher once per minute through OpenClaw cron, preserving bus-first coordination
    preflight via --adapter openclaw and --coordination-via runtime/agent_bus/.

notes: >
  This schedule intentionally omits interval_seconds. Each cron tick runs one
  bounded watch cycle and exits, avoiding a long-lived process inside the schedule
  executor. Continuous process supervision remains a lifecycle/bootstrap concern.
