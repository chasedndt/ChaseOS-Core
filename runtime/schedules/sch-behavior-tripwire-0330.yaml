# runtime/schedules/sch-behavior-tripwire-0330.yaml
# ChaseOS Scheduling Intent - canonical schedule declaration
#
# This file is ChaseOS-owned canonical state.
# Do not create or edit schedule intents directly in the runtime adapter
# (OpenClaw, n8n, etc.). The adapter reads this file and executes accordingly.
#
# Current execution: the schedule executor reads this intent and invokes:
#   chaseos run behavior_tripwire_scan
# through the AOR path at 03:30 ET daily (all 7 days), just after the 03:00 ET
# OS hygiene sweep.
#
# To change enabled state: chaseos schedule enable/disable sch-behavior-tripwire-0330
# Do not edit this file manually to toggle enabled - use the CLI.

schedule_id: sch-behavior-tripwire-0330
workflow_id: behavior_tripwire_scan

owner: "operator"

cadence:
  type: cron
  cron_expression: "30 3 * * *"
  timezone: America/New_York
  event_type: null
  event_source: null

trigger_source: hermes

runtime_adapter_target: hermes
runtime_adapter_fallback: openclaw
# Hermes is the primary schedule executor. OpenClaw is the declared fallback.
# Must be a registered adapter: hermes | openclaw | claude | n8n | local | manual

delivery:
  primary_target: vault-local
  vault_writeback_targets:
    - "07_LOGS/Runtime-Audits/"
  external_delivery_declared: false
  vault_local_only: true

approval_policy: none
# none = runs without operator confirmation at trigger time.
# A read-only detective scan needs no approval at trigger time; it blocks nothing
# and mutates no runtime state. Its only output is an alert-only report.

enabled: true
shadow_mode: false

failure_behavior: escalate

audit_requirements:
  - workflow_id
  - schedule_id
  - trigger_time
  - status
  - files_written
  - run_duration_seconds

allowed_workflow_task_types:
  - behavior-audit
# Only workflows with task_type=behavior-audit may execute on this schedule.

provenance:
  created_by: operator
  created_at: "2026-06-20T00:00:00Z"
  rationale: >
    Daily detective sweep. ChaseOS has a strong preventive layer but historically
    no automatically-running detective layer: rich behavioral signals (gate
    denials, escalated runs, side-effect events, unreviewed incident candidates)
    were collected and never analyzed. This schedule exercises the read-only
    behavior tripwire each morning at 03:30 ET, right after the 03:00 ET hygiene
    sweep, so an operator surface reads a fresh anomaly report.

notes: >
  Phase 9 Schedule Layer / Detective Layer. ChaseOS owns the behavior_tripwire_scan
  schedule intent. The executor invokes chaseos run behavior_tripwire_scan through
  the AOR path. Alert-only: a HIGH anomaly is reported in the run output and the
  written report, never as a blocked run. Report output:
  07_LOGS/Runtime-Audits/tripwire-YYYYMMDDTHHMMSS.json (+ .md).
