# runtime/schedules/sch-sbp-strikezone-digest-0600.yaml
# ChaseOS Scheduling Intent — canonical schedule declaration
#
# This file is ChaseOS-owned canonical state.
# Do not create or edit schedule intents directly in the runtime adapter
# (OpenClaw, n8n, etc.). The adapter reads this file and executes accordingly.
#
# Current posture: disabled fallback schedule. The live primary trigger is now:
#   acquisition.new_item -> events.watch -> sbp_strikezone_digest
# Keep this disabled unless the fixed 06:00 ET digest should temporarily replace
# event-triggered dispatch.
#
# To change enabled state: chaseos schedule enable/disable sch-sbp-strikezone-digest-0600
# Do not edit this file manually to toggle enabled — use the CLI.

schedule_id: sch-sbp-strikezone-digest-0600
workflow_id: sbp_strikezone_digest

owner: "operator"

cadence:
  type: cron
  cron_expression: "0 6 * * 1-5"
  timezone: America/New_York
  event_type: null
  event_source: null

trigger_source: hermes

runtime_adapter_target: hermes
runtime_adapter_fallback: openclaw
# Hermes is the primary schedule executor. OpenClaw is the declared fallback.
# Must be a registered adapter: hermes | openclaw | claude | n8n | local | manual

delivery:
  primary_target: vault-local
  vault_writeback_targets:
    - "07_LOGS/SBP-Runs/"
  external_delivery_declared: true
  vault_local_only: false
  external_targets:
    - type: discord
      channel_hint: "#strikezone-signals"
      credential_ref: "DISCORD_WEBHOOK_URL env var"
      # credential value is never here — see Credential-Boundaries-SOP.md

approval_policy: none
# none = runs at 0600 ET without operator confirmation.
# Change to pre-delivery if you want to review the digest before Discord delivery.

enabled: false
shadow_mode: false
# shadow_mode: false — digest is written and delivery proceeds.
# Set shadow_mode: true to run silently (vault write only, no Discord) during testing.

failure_behavior: escalate

audit_requirements:
  - workflow_id
  - schedule_id
  - trigger_time
  - status
  - files_written
  - run_duration_seconds

allowed_workflow_task_types:
  - scheduled-briefing
# Only workflows with task_type=scheduled-briefing may execute on this schedule.

provenance:
  created_by: operator
  created_at: "2026-04-22T00:00:00Z"
  rationale: >
    Daily morning market digest at 0600 ET on US weekdays, before NY pre-market open.
    StrikeZone community receives a structured briefing via Discord and vault writeback.
    ChaseOS owns the schedule intent. OpenClaw executes via chaseos run sbp_strikezone_digest.

notes: >
  Phase 9 SBP Pass 1B — first named SBP instance pipeline schedule.
  Disabled on 2026-04-27 when event-triggered dispatch became the live primary
  path for acquisition.new_item -> sbp_strikezone_digest. Keeping both this
  fixed 0600 ET schedule and the event watcher enabled would double-run the
  digest after successful acquisition.
  When enabled as a fallback, this runs 1 hour before operator_today (0700 ET)
  to ensure digest is available when the operator briefing pipeline fires.
  Discord delivery requires DISCORD_WEBHOOK_URL env var to be set.
  Without it, digest is still written to 07_LOGS/SBP-Runs/ — delivery gracefully skips.
