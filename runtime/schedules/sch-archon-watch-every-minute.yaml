# runtime/schedules/sch-archon-watch-every-minute.yaml
# ChaseOS Scheduling Intent - canonical schedule declaration
#
# This file is ChaseOS-owned canonical state.
# Hermes reads this intent and invokes:
#   chaseos run archon_watch
# once per minute so Archon can poll the coordination bus autonomously.
# OpenClaw is the declared fallback executor (runtime_adapter_fallback).
#
# The archon_watch manifest declares runtime_adapter: archon — the engine
# overrides runtime_id from the manifest after Stage 1, so scorecards,
# growth memory, and OSRIL events land under Archon, not OpenClaw.
#
# To change enabled state: chaseos schedule enable/disable sch-archon-watch-every-minute
# Do not edit this file manually to toggle enabled - use the CLI.

schedule_id: sch-archon-watch-every-minute
workflow_id: archon_watch

owner: "operator"

cadence:
  type: cron
  cron_expression: "* * * * *"
  timezone: America/New_York
  event_type: null
  event_source: null

trigger_source: hermes

runtime_adapter_target: hermes
runtime_adapter_fallback: openclaw
# Hermes is the primary schedule executor. OpenClaw is the declared fallback.
# The workflow itself remains bound to the Archon adapter through the manifest's
# runtime_adapter: archon field.

delivery:
  primary_target: vault-local
  vault_writeback_targets:
    - "07_LOGS/Agent-Activity/"
  external_delivery_declared: false
  vault_local_only: true

approval_policy: none

enabled: false
shadow_mode: false

# H-3 rate guard: 480 cycles/day = one cycle every 3 minutes on average.
# Enforcement is in engine.py pre-stage rate_check — cron still fires every
# minute but execution is blocked after this ceiling is reached for the UTC day.
max_cycles_per_day: 480

failure_behavior: escalate

audit_requirements:
  - workflow_id
  - schedule_id
  - trigger_time
  - status
  - cycles_run
  - tasks_dispatched
  - tasks_escalated
  - run_duration_seconds

allowed_workflow_task_types:
  - coordination

provenance:
  created_by: operator
  created_at: "2026-05-01T00:00:00Z"
  rationale: >
    Archon watch already exists as the bus polling and dispatch loop, but without
    schedule intent it must be invoked manually. This schedule runs the single-cycle
    watcher once per minute through OpenClaw cron. Archon's runtime identity is
    preserved via manifest.runtime_adapter: archon — the AOR engine overrides
    runtime_id from the manifest after workflow lookup, so scorecard, growth, and
    OSRIL attribution all land under the archon runtime record.

notes: >
  This schedule intentionally omits interval_seconds. Each cron tick runs one
  bounded watch cycle and exits, avoiding a long-lived process inside the schedule
  executor. Continuous process supervision remains a lifecycle/bootstrap concern.
  Archon differs from Hermes/OpenClaw in that it also executes directly in the
  Claude Code session (operator-driven) — this schedule enables autonomous
  background bus polling between direct operator sessions.
