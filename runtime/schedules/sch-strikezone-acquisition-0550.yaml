# runtime/schedules/sch-strikezone-acquisition-0550.yaml
# ChaseOS Scheduling Intent — canonical schedule declaration
#
# This file is ChaseOS-owned canonical state.
# Do not create or edit schedule intents directly in the runtime adapter
# (OpenClaw, n8n, etc.). The adapter reads this file and executes accordingly.
#
# Current execution: OpenClaw cron reads this intent and invokes:
#   chaseos run strikezone_acquisition
# through the AOR path at 05:50 ET on US weekdays.
#
# Schedule order: this job MUST complete before sch-sbp-strikezone-digest-0600.
# The 10-minute gap (0550 → 0600) is the acquisition→digest timing contract.
#
# To change enabled state: chaseos schedule enable/disable sch-strikezone-acquisition-0550
# Do not edit this file manually to toggle enabled — use the CLI.

schedule_id: sch-strikezone-acquisition-0550
workflow_id: strikezone_acquisition

owner: "operator"

cadence:
  type: cron
  cron_expression: "50 5 * * 1-5"
  timezone: America/New_York
  event_type: null
  event_source: null

trigger_source: hermes

runtime_adapter_target: hermes
runtime_adapter_fallback: openclaw
# Hermes is the primary schedule executor. OpenClaw is the declared fallback.
# Must be a registered adapter: hermes | openclaw | claude | n8n | local | manual

delivery:
  primary_target: vault-local
  vault_writeback_targets:
    - "runtime/acquisition/packs/"
  external_delivery_declared: false
  vault_local_only: true
  # vault_local_only: true — writes pack artifacts and latest-pointer only.
  # No Discord, email, or external delivery from this workflow.

approval_policy: none
# none = runs without operator confirmation at trigger time.
# This is a pre-brief data acquisition job, not a human-facing output.

enabled: true
shadow_mode: true
# shadow_mode: true — prevents autonomous live paid API calls (Perplexity, Grok, IMAP, Google).
# Set shadow_mode: false only after explicit operator review of all acquisition connectors.
# C-1 security hardening 2026-05-18.

approval_gate: true
# C-1 remediation: operator must explicitly approve re-enabling live acquisition connectors.
# The schedule definition remains active; shadow_mode blocks live API calls.
# approval_gate=true documents that human sign-off is required before moving to live mode.

failure_behavior: escalate
# On failure: escalate and log. The downstream digest will degrade gracefully
# (optional=true on its acquisition-pack adapter).

audit_requirements:
  - workflow_id
  - schedule_id
  - trigger_time
  - status
  - briefing_ready_input_set_path
  - latest_pointer_path
  - run_duration_seconds

allowed_workflow_task_types:
  - source-pack-builder
# Only source-pack-builder task_type workflows may execute on this schedule.

provenance:
  created_by: operator
  created_at: "2026-04-23T00:00:00Z"
  rationale: >
    Pre-brief acquisition run at 0550 ET on US weekdays, 10 minutes before the
    0600 ET StrikeZone SBP digest. Reads Now.md and StrikeZone-Crypto-OS.md, builds
    first-wave source pack artifacts, writes strikezone-latest.json pointer.
    The digest resolves the pack dynamically via that pointer rather than a
    hardcoded date-stamped path.

notes: >
  Schedule order: sch-strikezone-acquisition-0550 (this) fires at 0550 ET.
  sch-sbp-strikezone-digest-0600 fires at 0600 ET.
  The 10-minute window is the acquisition→digest timing contract.
  If acquisition fails, the digest degrades gracefully (optional=true).
  Output: runtime/acquisition/packs/<date>-strikezone-daily/ artifacts
  + runtime/acquisition/packs/strikezone-latest.json pointer.
