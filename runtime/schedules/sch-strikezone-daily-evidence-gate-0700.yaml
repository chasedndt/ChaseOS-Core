# runtime/schedules/sch-strikezone-daily-evidence-gate-0700.yaml
schedule_id: sch-strikezone-daily-evidence-gate-0700
workflow_id: strikezone_daily_evidence_gate
owner: "operator"
cadence:
  type: cron
  cron_expression: "0 7 * * *"
  timezone: America/New_York
trigger_source: hermes
runtime_adapter_target: hermes
runtime_adapter_fallback: openclaw
delivery:
  primary_target: vault-local
  vault_writeback_targets:
    - "07_LOGS/SBP-Runs/StrikeZone/"
    - "runtime/acquisition/state/"
    - "runtime/scorecards/"
  external_delivery_declared: false
  vault_local_only: true
approval_policy: pre-delivery
enabled: false
shadow_mode: true
approval_gate: true
failure_behavior: escalate
allowed_workflow_task_types:
  - evidence-gated-market-analysis
audit_requirements:
  - workflow_id
  - schedule_id
  - trigger_time
  - run_slug
  - pipeline_validation_report
  - prediction_candidates_path
  - no_external_delivery
  - no_trade_execution
provenance:
  created_by: operator
  created_at: "2026-05-31T00:00:00Z"
  rationale: >
    Disabled local-only evidence gate for Strikezone daily analysis. It remains
    shadowed until a fresh end-to-end run passes all gates under a new slug and
    the operator approves recurring execution.
notes: >
  Disabled until a fresh end-to-end run passes all gates under a new slug and the operator approves recurring execution. This schedule creates local artifacts only; it does not post or trade.
