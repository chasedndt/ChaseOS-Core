runtime_id: "codex"
platform: "local-session"
lifecycle_mode: "manual"
coordination_watch:
  enabled: true
  runtime_name: "Codex"
  interval_seconds: 60
  claim_next: true
  stale_after_seconds: 900
  supervision:
    enabled: false
    autostart: false
    restart_policy: "manual"
    state_file: "runtime/lifecycle/run/codex-coordination-watch.json"
    log_file: "runtime/lifecycle/run/codex-coordination-watch.log"
    notes: "Codex / Axiom-Codex is session-scoped; liveness comes from an active Codex daemon/session heartbeat."
  notes: "Codex remains a registered bus runtime even when no Codex session is active."
start:
  kind: "manual-session"
  command: "codex"
stop:
  kind: "manual-session"
  command: "operator ends Codex session"
restart:
  kind: "manual-session"
  command: "operator starts a new Codex session"
health:
  kind: "heartbeat"
  expected_hint: "Fresh Codex/Axiom-Codex Agent Bus heartbeat from active Codex routing."
ownership: "session-scoped-codex-runtime"
notes: "Codex is the canonical bus identity for the Axiom-Codex runtime lane. Registration identity is stable; active/reachable state depends on the corresponding session/daemon being running."
