runtime_id: "hermes"
platform: "wsl"
lifecycle_mode: "wsl-process"
coordination_watch:
  enabled: true
  runtime_name: "Hermes"
  interval_seconds: 30
  claim_next: true
  stale_after_seconds: 900
  supervision:
    enabled: true
    autostart: true
    restart_policy: "manual"
    state_file: "runtime/lifecycle/run/hermes-coordination-watch.json"
    log_file: "runtime/lifecycle/run/hermes-coordination-watch.log"
    notes: "ChaseOS-managed background launcher/state for the Hermes coordination-watch loop."
  bootstrap:
    enabled: true
    registration_kind: "windows-task-scheduler"
    trigger: "on-logon"
    task_name: "ChaseOS-Hermes-Coordination-Watch"
    launcher_path: "runtime/lifecycle/bootstrap/hermes-coordination-watch-start.vbs"
    registration_artifact: "runtime/lifecycle/bootstrap/hermes-coordination-watch-registration.json"
    handoff_script_path: "runtime/lifecycle/bootstrap/hermes-coordination-watch-handoff.ps1"
    handoff_artifact_path: "runtime/lifecycle/bootstrap/hermes-coordination-watch-handoff.json"
    reboot_verify_script_path: "runtime/lifecycle/bootstrap/hermes-coordination-watch-reboot-verify.ps1"
    reboot_verify_artifact_path: "runtime/lifecycle/bootstrap/hermes-coordination-watch-reboot-verify.json"
    reboot_verify_result_path: "runtime/lifecycle/run/hermes-coordination-watch-reboot-verify-result.json"
    success_record_path: "runtime/lifecycle/run/hermes-coordination-watch-bootstrap-success.json"
    event_log_path: "runtime/lifecycle/run/hermes-coordination-watch-bootstrap-events.jsonl"
    wsl_distro: "Ubuntu"
    supervisor_host: "windows"
    notes: "ChaseOS-owned host-registration artifact for Windows Task Scheduler startup of the Hermes coordination-watch supervisor. The Hermes gateway runs through WSL, but the ChaseOS coordination-watch supervisor runs on Windows Python because the Agent Bus SQLite store is Windows-hosted."
  notes: "ChaseOS-owned coordination refresh loop for the Hermes runtime lane."
start:
  kind: "command"
  command: "hermes start"
stop:
  kind: "command"
  command: "hermes stop"
restart:
  kind: "command"
  command: "hermes restart"
health:
  kind: "http"
  probe_label: "hermes-local-http-candidate-scan"
  candidate_ports:
    - 18790
    - 18791
  urls:
    - "http://127.0.0.1:18790/"
    - "http://localhost:18790/"
    - "http://127.0.0.1:18791/"
    - "http://localhost:18791/"
  success_statuses:
    - 200
    - 401
  timeout_seconds: 3
  notes: "Hermes health currently uses multi-port local HTTP probing because the WSL/runtime binding surface still needs live port confirmation."
startup_surfaces:
  gateway:
    surface_id: "gateway"
    surface_type: "gateway_launcher"
    ui_label: "Hermes Gateway"
    supported: true
    toggle_supported: true
    current_state_source: "host_startup_file"
    startup_registration_kind: "windows-startup-folder"
    mutation_status: "studio-local-app-built-approval-artifacts-built-host-executor-pending"
    path_resolution: "dynamic-user"
    launcher_path: "{windows_startup_dir}\\Hermes Gateway.vbs"
    target_path: "{windows_userprofile}\\.hermes\\gateway.cmd"
    launcher_template_version: "2026.05.25-wslservice-idempotent-autostart"
    launch_kind: "wsl"
    wsl_distro: "Ubuntu"
    wsl_user: ""
    wsl_workdir: "{wsl_vault_path}"
    wsl_command: "export HERMES_HOME=${CHASEOS_HERMES_HOME:-${HERMES_HOME:-${HOME}/runtimes/hermes-home}} && exec ${HOME}/.local/bin/hermes gateway run"
    windows_vault_path: "{windows_vault_path}"
    coordination_daemon_loop_path: "{windows_userprofile}\\.hermes\\hermes-daemon-loop.cmd"
    coordination_daemon_log_path: "{windows_vault_path}\\runtime\\lifecycle\\run\\hermes-daemon.log"
    python_path: "{windows_vault_path}\\.venv\\Scripts\\python.exe"
    diagnostic_log_path: "{windows_userprofile}\\.hermes\\gateway-startup.log"
    retry_attempts: 12
    retry_delay_seconds: 10
    status_command: "chaseos runtime startup-surfaces --runtime hermes --json"
    notes: "Portable Windows Startup launcher for the WSL-hosted Hermes gateway. ChaseOS resolves the Windows user profile, Startup folder, vault path, WSL mount path, and optional WSL user at runtime, so installer/GitHub installs are not tied to C:\\Users\\chaseos. The managed target launcher starts the Windows-side ChaseOS Hermes daemon first, records WSLService/LxssManager diagnostics for Store and legacy WSL hosts, enters the configured Ubuntu distro using the default WSL user unless CHASEOS_HERMES_WSL_USER is set, runs from the resolved ChaseOS repo path, exports HERMES_HOME to ${HOME}/runtimes/hermes-home unless CHASEOS_HERMES_HOME/HERMES_HOME already overrides it, retries while WSL is coming online after logon, writes a diagnostic startup log, and keeps the Hermes gateway in the foreground with a visible ChaseOS Hermes Gateway terminal. The launcher intentionally passes WSL distro/user values unquoted because this Windows Store WSL build fails `wsl.exe -d \"Ubuntu\"` while accepting `wsl.exe -d Ubuntu`. The runtime CLI toggle is live through startup-surface-toggle and records inline approval; the Studio CLI/local app mode writes are routed through the lifecycle toggle so approval markers/events are recorded."
  coordination_watch_supervisor:
    surface_id: "coordination_watch_supervisor"
    surface_type: "coordination_watch_supervisor"
    ui_label: "Hermes Coordination Watch"
    supported: true
    toggle_supported: true
    current_state_source: "coordination_watch_supervisor"
    startup_registration_kind: "host-process"
    mutation_status: "studio-local-app-built-approval-artifacts-built-host-executor-pending"
    status_command: "chaseos runtime coordination-watch-supervisor --runtime hermes --action status --json"
    notes: "Current-session ChaseOS coordination-watch supervisor status for Hermes. The supervisor is Windows-hosted even though the Hermes gateway is WSL-hosted."
  coordination_watch_bootstrap:
    surface_id: "coordination_watch_bootstrap"
    surface_type: "coordination_watch_bootstrap"
    ui_label: "Hermes Startup Registration"
    supported: true
    toggle_supported: true
    current_state_source: "coordination_watch_bootstrap"
    startup_registration_kind: "windows-task-scheduler"
    mutation_status: "studio-local-app-built-approval-artifacts-built-host-executor-pending"
    status_command: "chaseos runtime coordination-watch-bootstrap --runtime hermes --action activation-report --json"
    enable_command: "chaseos runtime coordination-watch-bootstrap --runtime hermes --action activation-checklist --json"
    disable_command: "chaseos runtime coordination-watch-bootstrap --runtime hermes --action activation-checklist --json"
    notes: "Host startup registration can be controlled through the startup-surface-toggle CLI, the Studio runtime-startup-controls CLI wrapper, and the localhost runtime-startup-controls app; future broad Studio desktop toggles should use the same activation checklist/report evidence chain."
ownership: "chaseos-managed-runtime-lane"
notes: "WSL-hosted runtime lane (platform: wsl). The runtime activation contract (06_AGENTS/Runtime-Setup-and-Activation-Architecture.md + Hermes-Activation-Runbook.md) owns the setup/detect/activate flow: runtime/lifecycle/runtime_detect.py detects the WSL binary via 'wsl -d <distro> hermes --version', and 'chaseos runtime activate --runtime hermes' drives the 7-stage checklist (read-only plan; --confirm emits Stage-3 install scripts). Process/service ownership: the gateway runs inside WSL while the ChaseOS coordination-watch supervisor runs on Windows because the Agent Bus SQLite store is Windows-hosted (see startup_surfaces above)."
